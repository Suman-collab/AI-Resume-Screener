<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#grad)"/>
  
  <!-- Brain Icon -->
  <g transform="translate(8, 8)">
    <!-- Left hemisphere -->
    <circle cx="3" cy="3" r="2.5" stroke="#ffffff" stroke-width="0.8" fill="none"/>
    <!-- Right hemisphere -->
    <circle cx="13" cy="3" r="2.5" stroke="#ffffff" stroke-width="0.8" fill="none"/>
    <!-- Center brain bulb -->
    <circle cx="8" cy="8" r="5" stroke="#ffffff" stroke-width="0.8" fill="none"/>
    <!-- Brain pattern curves -->
    <path d="M 6 9 Q 8 7 10 9" stroke="#ffffff" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <path d="M 6 11 Q 8 13 10 11" stroke="#ffffff" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  </g>
</svg>